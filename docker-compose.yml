services:
  cacs:
    build: .
    image: cacs:local
    container_name: cacs
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"          # Web UI:  http://<host>:8080
    environment:
      SYNC_INTERVAL: "300"   # default interval (changeable in the UI)
      LOG_LEVEL: "INFO"
      # Optional admin bootstrap (otherwise first-time setup in the browser at /setup):
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
    volumes:
      # Bind mounts (no named volumes):
      - /opt/docker-volumes/cacs/config:/config   # generated vdirsyncer.conf
      - /opt/docker-volumes/cacs/data:/data       # DB, UI config, OAuth tokens, sync status
      - /opt/docker-volumes/cacs/logs:/logs       # vdirsyncer.log
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
