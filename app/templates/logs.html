{% extends "base.html" %}
{% block title %}calSync · Logs{% endblock %}
{% block nav_logs %}active{% endblock %}
{% block content %}
<div class="row gap between">
  <h1>Logs</h1>
  <label class="row gap"><input type="checkbox" id="auto" checked> Auto-Refresh (4s)</label>
</div>
<pre class="logbox" id="log">lädt…</pre>
{% endblock %}
{% block scripts %}
<script>
  const box=document.getElementById('log');
  async function load(){ try{ const t=await api('/api/logs?lines=600');
    const atBottom = box.scrollTop+box.clientHeight >= box.scrollHeight-30;
    box.textContent=t; if(atBottom) box.scrollTop=box.scrollHeight; }catch(e){} }
  setInterval(()=>{ if(document.getElementById('auto').checked) load(); }, 4000);
  load();
</script>
{% endblock %}
