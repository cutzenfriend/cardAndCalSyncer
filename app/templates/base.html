<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Ca<span>Cs</span></a>
    <nav>
      <a href="/" class="{% block nav_dash %}{% endblock %}">Dashboard</a>
      <a href="/activity" class="{% block nav_act %}{% endblock %}">Aktivität</a>
      <a href="/runs" class="{% block nav_runs %}{% endblock %}">Läufe</a>
      <a href="/logs" class="{% block nav_logs %}{% endblock %}">Logs</a>
      <a href="/config" class="{% block nav_cfg %}{% endblock %}">Konfiguration</a>
    </nav>
    <span id="livebadge" class="badge badge-idle">…</span>
    <a href="/logout" class="logout" title="Abmelden">⎋</a>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    async function api(path, opts){
      const r = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}));
      if(!r.ok){ throw new Error((await r.text()) || r.status); }
      const ct = r.headers.get('content-type')||'';
      return ct.includes('json') ? r.json() : r.text();
    }
    async function refreshBadge(){
      try{
        const s = await api('/api/status');
        const b = document.getElementById('livebadge');
        if(s.busy){ b.textContent='Sync läuft…'; b.className='badge badge-run'; }
        else if(!s.sync_enabled){ b.textContent='pausiert'; b.className='badge badge-off'; }
        else { const eta = s.next_run_in!=null ? ' · nächster in '+s.next_run_in+'s':'';
               b.textContent='aktiv'+eta; b.className='badge badge-ok'; }
      }catch(e){ /* ignore */ }
    }
    setInterval(refreshBadge, 4000); refreshBadge();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
